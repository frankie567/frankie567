<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>

    <!-- Meta Tags -->
    <meta name="description" content="{{ description }}" />
    <meta property="og:title" content="{{ title }}" />
    <meta property="og:description" content="{{ description }}" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="François Voron" />
    <meta property="og:locale" content="en" />
    <meta property="og:url" content="{{ host }}{{ url }}" />
    {% if image %}
    <meta property="og:image" content="{{ image }}" />
    <meta property="twitter:image" content="{{ image }}" />
    {% else %}
    <meta property="og:image" content="{{ host }}/meta-image.jpg" />
    <meta property="twitter:image" content="{{ host }}/meta-image.jpg" />
    {% endif %}
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="{{ title }}" />
    <meta property="twitter:description" content="{{ description }}" />
    <meta property="twitter:creator" content="@fvoron" />
    <meta property="twitter:site" content="@fvoron" />

    {% if canonical %}
    <link rel="canonical" href="{{ canonical }}" />
    {% endif %}

    <!-- Favicon and Icons -->
    <link rel="icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#EF4444" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheets -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- Feed -->
    <link
      href="/feed.xml"
      type="application/atom+xml"
      rel="alternate"
      title="François Voron"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "url": "{{ host }}",
        "logo": "{{ host }}/logos/francois-voron.svg"
      }
    </script>
  </head>
  <body class="font-mono antialiased text-gray-300 tracking-tight relative">
    <!-- CRT scanline effect overlay -->
    <div
      id="crt-overlay"
      class="fixed inset-0 pointer-events-none bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.08),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] z-50 bg-[length:100%_2px,3px_100%]"
    ></div>

    <!-- Main content -->
    <main class="min-h-screen">{% block content %}{% endblock %}</main>

    <!-- Terminal-style sticky footer with navigation tabs -->
    <footer
      class="fixed bottom-0 left-0 right-0 z-50 border-t"
      style="
        background: rgba(10, 10, 10, 0.98);
        border-color: var(--color-terminal-border);
        backdrop-filter: blur(10px);
      "
    >
      <div class="max-w-6xl mx-auto px-4 sm:px-6">
        <div
          class="flex flex-col sm:flex-row items-center justify-between h-auto sm:h-14 py-2 sm:py-0 gap-2 sm:gap-0"
        >
          <!-- Left: Navigation tabs -->
          <nav
            class="flex items-center gap-1 flex-wrap justify-center sm:justify-start"
          >
            <a
              href="/"
              class="px-3 sm:px-4 py-2 text-xs sm:text-sm font-medium transition-colors hover:text-gray-100 flex items-center gap-1 sm:gap-2"
              style="color: var(--color-terminal-fg)"
              data-nav="home"
            >
              <span style="color: var(--color-terminal-accent)">$</span>
              <span class="ml-1">fvoron</span>
              <span
                class="hidden sm:inline text-xs opacity-50 ml-1"
                style="color: var(--color-terminal-cyan)"
                >[h]</span
              >
            </a>
            <a
              href="/blog"
              class="px-3 sm:px-4 py-2 text-xs sm:text-sm font-medium transition-colors hover:text-gray-100 flex items-center gap-1 sm:gap-2"
              style="color: var(--color-terminal-fg)"
              data-nav="blog"
            >
              <span>blog</span>
              <span
                class="hidden sm:inline text-xs opacity-50"
                style="color: var(--color-terminal-cyan)"
                >[b]</span
              >
            </a>
            <a
              href="/open-source"
              class="px-3 sm:px-4 py-2 text-xs sm:text-sm font-medium transition-colors hover:text-gray-100 flex items-center gap-1 sm:gap-2"
              style="color: var(--color-terminal-fg)"
              data-nav="opensource"
            >
              <span>open source</span>
              <span
                class="hidden sm:inline text-xs opacity-50"
                style="color: var(--color-terminal-cyan)"
                >[o]</span
              >
            </a>
          </nav>

          <!-- Right: CRT toggle + Social links -->
          <div class="flex items-center gap-2">
            <!-- CRT Toggle -->
            <button
              id="crt-toggle"
              class="p-1.5 sm:p-2 border transition-all hover:border-gray-600 flex items-center gap-1.5 text-xs"
              style="
                border-color: var(--color-terminal-border);
                color: var(--color-terminal-fg);
              "
              title="Toggle CRT effect"
              aria-label="Toggle CRT effect"
            >
              <span class="hidden sm:inline opacity-70">crt</span>
              <span
                id="crt-status"
                class="font-bold"
                style="color: var(--color-terminal-accent)"
                >[on]</span
              >
            </button>
            <a
              href="https://github.com/frankie567"
              class="p-1.5 sm:p-2 border transition-all hover:border-gray-600"
              style="
                border-color: var(--color-terminal-border);
                color: var(--color-terminal-fg);
              "
              aria-label="Github"
              target="_blank"
              rel="noopener"
              title="GitHub"
            >
              <svg
                class="w-3.5 h-3.5 sm:w-4 sm:h-4 fill-current"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.17 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.167 22 16.418 22 12c0-5.523-4.477-10-10-10z"
                />
              </svg>
            </a>
            <a
              href="https://twitter.com/fvoron"
              class="p-1.5 sm:p-2 border transition-all hover:border-gray-600"
              style="
                border-color: var(--color-terminal-border);
                color: var(--color-terminal-fg);
              "
              aria-label="Twitter"
              target="_blank"
              rel="noopener"
              title="Twitter"
            >
              <svg
                class="w-3.5 h-3.5 sm:w-4 sm:h-4 fill-current"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"
                />
              </svg>
            </a>
            <a
              href="https://www.linkedin.com/in/fvoron/"
              class="p-1.5 sm:p-2 border transition-all hover:border-gray-600"
              style="
                border-color: var(--color-terminal-border);
                color: var(--color-terminal-fg);
              "
              aria-label="LinkedIn"
              target="_blank"
              rel="noopener"
              title="LinkedIn"
            >
              <svg
                class="w-3.5 h-3.5 sm:w-4 sm:h-4 fill-current"
                viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </footer>

    <!-- Keyboard navigation -->
    <script>
      document.addEventListener("keydown", function (event) {
        // Only trigger if not in an input field
        if (
          event.target.tagName !== "INPUT" &&
          event.target.tagName !== "TEXTAREA" &&
          !event.ctrlKey &&
          !event.metaKey &&
          !event.altKey
        ) {
          if (event.key === "h") {
            event.preventDefault();
            window.location.href = "/";
          }
          if (event.key === "b") {
            event.preventDefault();
            window.location.href = "/blog";
          }
          if (event.key === "o") {
            event.preventDefault();
            window.location.href = "/open-source";
          }
        }
      });

      // Highlight active nav tab
      document.addEventListener("DOMContentLoaded", function () {
        const path = window.location.pathname;
        const navLinks = document.querySelectorAll("[data-nav]");

        navLinks.forEach((link) => {
          const href = link.getAttribute("href");
          // Exact match for home, or check if path starts with href followed by / or end
          if (href === "/" && path === "/") {
            link.style.color = "var(--color-terminal-accent)";
            link.style.borderBottom = "2px solid var(--color-terminal-accent)";
          } else if (
            href !== "/" &&
            (path === href || path.startsWith(href + "/"))
          ) {
            link.style.color = "var(--color-terminal-accent)";
            link.style.borderBottom = "2px solid var(--color-terminal-accent)";
          }
        });

        // Tab navigation for blog posts and projects
        let currentItemIndex = -1;
        const navigableItems = document.querySelectorAll(
          ".blog-post a, .project-item a",
        );

        if (navigableItems.length > 0) {
          document.addEventListener("keydown", function (e) {
            // Only if not in input fields
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")
              return;

            if (
              (e.key === "Tab" && !e.ctrlKey) ||
              e.key === "ArrowDown" ||
              e.key === "ArrowUp"
            ) {
              e.preventDefault();

              if (e.shiftKey || e.key === "ArrowUp") {
                // Shift+Tab or ArrowUp: go backwards
                currentItemIndex--;
                if (currentItemIndex < 0)
                  currentItemIndex = navigableItems.length - 1;
              } else {
                // Tab or ArrowDown: go forwards
                currentItemIndex++;
                if (currentItemIndex >= navigableItems.length)
                  currentItemIndex = 0;
              }

              // Remove previous focus styling
              navigableItems.forEach((item) => {
                item.style.outline = "";
                item.style.backgroundColor = "";
              });

              // Add focus styling to current item
              if (navigableItems[currentItemIndex]) {
                navigableItems[currentItemIndex].style.outline =
                  "2px solid var(--color-terminal-accent)";
                navigableItems[currentItemIndex].style.backgroundColor =
                  "rgba(239, 68, 68, 0.1)";
                navigableItems[currentItemIndex].scrollIntoView({
                  behavior: "smooth",
                  block: "center",
                });
              }
            } else if (
              e.key === "Enter" &&
              currentItemIndex >= 0 &&
              !e.ctrlKey
            ) {
              // Enter: open the focused item
              e.preventDefault();
              if (navigableItems[currentItemIndex]) {
                navigableItems[currentItemIndex].click();
              }
            }
          });
        }

        // CRT toggle functionality
        const crtOverlay = document.getElementById("crt-overlay");
        const crtToggle = document.getElementById("crt-toggle");
        const crtStatus = document.getElementById("crt-status");

        // Check localStorage for saved preference
        const crtEnabled = localStorage.getItem("crt-enabled");
        if (crtEnabled === "false") {
          crtOverlay.style.display = "none";
          crtStatus.textContent = "[off]";
          crtStatus.style.color = "var(--color-terminal-fg)";
        }

        crtToggle.addEventListener("click", function () {
          if (crtOverlay.style.display === "none") {
            crtOverlay.style.display = "";
            crtStatus.textContent = "[on]";
            crtStatus.style.color = "var(--color-terminal-accent)";
            localStorage.setItem("crt-enabled", "true");
          } else {
            crtOverlay.style.display = "none";
            crtStatus.textContent = "[off]";
            crtStatus.style.color = "var(--color-terminal-fg)";
            localStorage.setItem("crt-enabled", "false");
          }
        });
      });
    </script>
  </body>
</html>
