{% extends "base" %}

{% block content %}
<section class="relative">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="pt-32 pb-12 md:pt-40 md:pb-20">

      <!-- Page header -->
      <div class="max-w-3xl pb-12 md:pb-20 text-center md:text-left">
        <h1 class="h1">
          Happy clients who trusted me for their projects.
        </h1>
      </div>

      <!-- References list -->
      <div class="max-w-sm mx-auto md:max-w-none">

        <!-- References container -->
        <div class="grid gap-12 md:grid-cols-3 md:gap-x-6 md:gap-y-8 items-start">
          {% for reference in references %}
          <div class="flex flex-col h-full" data-aos="zoom-y-out">
            <header>
              <a href="/references/{{ reference.slug }}" class="block mb-6">
                <figure class="relative h-0 pb-9/16 overflow-hidden translate-z-0 rounded">
                  <img class="absolute inset-0 w-full h-full object-cover transform scale-105 hover:-translate-y-1 transition duration-700 ease-out" src="{{ reference.thumbnail }}" width="352" height="198" alt="{{ reference.title }}">
                </figure>
              </a>
              <div class="mb-3">
                <ul class="flex flex-wrap text-xs font-medium -m-1">
                  <li class="m-1">
                    <span class="inline-flex text-center py-1 px-3 rounded-full bg-red-500">{{ reference.client }}</span>
                  </li>
                  <li class="m-1">
                    <span class="inline-flex text-center py-1 px-3 rounded-full bg-gray-800">{{ reference.year }}</span>
                  </li>
                </ul>
              </div>
              <h2 class="text-xl font-bold leading-snug tracking-tight mb-2">
                <a href="/references/{{ reference.slug }}" class="hover:underline">{{ reference.title }}</a>
              </h2>
            </header>
            <p class="text-gray-400 flex-grow">{{ reference.excerpt }}</p>
          </div>
          {% endfor %}
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
